[build]
  publish = "."
  command = """
cat > env.js <<EOF
window.TENNIS_CONFIG = {
  supabaseUrl: "${SUPABASE_URL}",
  supabaseAnonKey: "${SUPABASE_ANON_KEY}",
  siteUrl: "${SITE_URL:-https://cafesowoo.github.io/tennis-homepage/}",
  ownerEmail: "${OWNER_EMAIL:-harminis@gmail.com}",
  allowRemoteWrites: false
};
EOF
"""
